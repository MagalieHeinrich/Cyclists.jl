name: Run Physics Tests

on:
  push:
    branches: [ main, setup-project, feature-* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Julia Runtime
      uses: julia-actions/setup-julia@v2
      with:
        version: '1.10'

    - name: Cache Julia Packages
      uses: julia-actions/cache@v2

    - name: Install Project Dependencies
      shell: bash
      run: |
        julia -e '
          using Pkg;
          Pkg.activate(".");
          Pkg.instantiate();
        '

    - name: Execute Simulation Test Suite
      shell: bash
      run: julia runtests.jl